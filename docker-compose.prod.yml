name: emuready-discord-giveaway

services:
  api:
    image: ${IMAGE:?IMAGE is required}
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:?DISCORD_PUBLIC_KEY is required}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      GUILD_ID: ${GUILD_ID:?GUILD_ID is required}
      GIVEAWAY_ROLE_ID: ${GIVEAWAY_ROLE_ID:?GIVEAWAY_ROLE_ID is required}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?GITHUB_CLIENT_ID is required}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?GITHUB_CLIENT_SECRET is required}
      GITHUB_REPO: ${GITHUB_REPO:?GITHUB_REPO is required}
      GITHUB_OAUTH_SCOPE: ${GITHUB_OAUTH_SCOPE:-}
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN:-}
      BASE_URL: ${BASE_URL:?BASE_URL is required}
      SIGNING_SECRET: ${SIGNING_SECRET:?SIGNING_SECRET is required}
      STATE_TTL_SECONDS: ${STATE_TTL_SECONDS:-600}
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: giveaway
      POSTGRES_USER: giveaway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giveaway -d giveaway"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
